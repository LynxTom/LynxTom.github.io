Allgemeines zur Datenverarbeitung

1. Umfang der Verarbeitung personenbezogener Daten Wir verarbeiten personenbezogene Daten unserer Nutzer grundsätzlich nur, soweit dies zur Bereitstellung einer funktionsfähigen Website sowie unserer Inhalte und Leistungen erforderlich ist. Die Verarbeitung personenbezogener Daten unserer Nutzer erfolgt regelmäßig nur nach Einwilligung des Nutzers. Eine Ausnahme gilt in solchen Fällen, in denen eine vorherige Einholung einer Einwilligung aus tatsächlichen Gründen nicht möglich ist und die Verarbeitung der Daten durch gesetzliche Vorschriften gestattet ist.

2. Rechtsgrundlage für die Verarbeitung personenbezogener Daten
Soweit wir für Verarbeitungsvorgänge personenbezogener Daten eine Einwilligung der betroffenen Person einholen, dient Art. 6 Abs. 1 lit. a EU-Datenschutzgrundverordnung (DSGVO) als Rechtsgrundlage. Bei der Verarbeitung von personenbezogenen Daten, die zur Erfüllung eines Vertrages, dessen Vertragspartei die betroffene Person ist, erforderlich ist, dient Art. 6 Abs. 1 lit. b DSGVO als Rechtsgrundlage. Dies gilt auch für Verarbeitungsvorgänge, die zur Durchführung vorvertraglicher Maßnahmen erforderlich sind. Soweit eine Verarbeitung personenbezogener Daten zur Erfüllung einer rechtlichen Verpflichtung erforderlich ist, der unser Unternehmen unterliegt, dient Art. 6 Abs. 1 lit. c DSGVO als Rechtsgrundlage. Für den Fall, dass lebenswichtige Interessen der betroffenen Person oder einer anderen natürlichen Person eine Verarbeitung personenbezogener Daten erforderlich machen, dient Art. 6 Abs. 1 lit. d DSGVO als Rechtsgrundlage. Ist die Verarbeitung zur Wahrung eines berechtigten Interesses unseres Unternehmens oder eines Dritten erforderlich und überwiegen die Interessen, Grundrechte und Grundfreiheiten des Betroffenen das erstgenannte Interesse nicht, so dient Art. 6 Abs. 1 lit. f DSGVO als Rechtsgrundlage für die Verarbeitung.

3. Datenlöschung und Speicherdauer
Die personenbezogenen Daten der betroffenen Person werden gelöscht oder gesperrt, sobald der Zweck der Speicherung entfällt. Eine Speicherung kann darüber hinaus erfolgen, wenn dies durch den europäischen oder nationalen Gesetzgeber in unionsrechtlichen Verordnungen, Gesetzen oder sonstigen Vorschriften, denen der Verantwortliche unterliegt, vorgesehen wurde. Eine Sperrung oder Löschung der Daten erfolgt auch dann, wenn eine durch die genannten Normen vorgeschriebene Speicherfrist abläuft, es sei denn, dass eine Erforderlichkeit zur weiteren Speicherung der Daten für einen Vertragsabschluss oder eine Vertragserfüllung besteht.

Bereitstellung der Website und Erstellung von Logfiles

1. Beschreibung und Umfang der Datenverarbeitung
Bei jedem Aufruf unserer Internetseite erfasst unser System automatisiert Daten und Informationen vom Computersystem des aufrufenden Rechners.

Folgende Daten werden hierbei erhoben:
(1) Informationen über den Browsertyp und die verwendete Version
(2) Das Betriebssystem des Nutzers
(3) Den Internet-Service-Provider des Nutzers
(4) Die IP-Adresse des Nutzers
(5) Datum und Uhrzeit des Zugriffs
(6) Websites, von denen das System des Nutzers auf unsere Internetseite gelangt
(7) Websites, die vom System des Nutzers über unsere Website aufgerufen werden
Die Daten werden ebenfalls in den Logfiles unseres Systems gespeichert. Eine Speicherung dieser Daten zusammen mit anderen personenbezogenen Daten des Nutzers findet nicht statt.

2. Rechtsgrundlage für die Datenverarbeitung
Rechtsgrundlage für die vorübergehende Speicherung der Daten und der Logfiles ist Art. 6 Abs. 1 lit. f DSGVO.

3. Zweck der Datenverarbeitung
Die vorübergehende Speicherung der IP-Adresse durch das System ist notwendig, um eine Auslieferung der Website an den Rechner des Nutzers zu ermöglichen. Hierfür muss die IP-Adresse des Nutzers für die Dauer der Sitzung gespeichert bleiben. Die Speicherung in Logfiles erfolgt, um die Funktionsfähigkeit der Website sicherzustellen. Zudem dienen uns die Daten zur Optimierung der Website und zur Sicherstellung der Sicherheit unserer informationstechnischen Systeme. Eine Auswertung der Daten zu Marketingzwecken findet in diesem Zusammenhang nicht statt. In diesen Zwecken liegt auch unser berechtigtes Interesse an der Datenverarbeitung nach Art. 6 Abs. 1 lit. f DSGVO.

4. Dauer der Speicherung
Die Daten werden gelöscht, sobald sie für die Erreichung des Zweckes ihrer Erhebung nicht mehr erforderlich sind. Im Falle der Erfassung der Daten zur Bereitstellung der Website ist dies der Fall, wenn die jeweilige Sitzung beendet ist. Im Falle der Speicherung der Daten in Logfiles ist dies nach spätestens zehn Tagen der Fall. Eine darüberhinausgehende Speicherung im Zusammenhang mit Datensicherungen ist möglich, in diesem Fall beträgt die maximale Dauer der Speicherung sechs Monate.

5. Widerspruchs- und Beseitigungsmöglichkeit
Die Erfassung der Daten zur Bereitstellung der Website und die Speicherung der Daten in Logfiles ist für den Betrieb der Internetseite zwingend erforderlich. Es besteht folglich seitens des Nutzers keine Widerspruchsmöglichkeit.

Verwendung von Cookies

1. Beschreibung und Umfang der Datenverarbeitung
Unsere Webseite verwendet Cookies. Bei Cookies handelt es sich um Textdateien, die im Internetbrowser bzw. vom Internetbrowser auf dem Computersystem des Nutzers gespeichert werden. Ruft ein Nutzer eine Website auf, so kann ein Cookie auf dem Betriebssystem des Nutzers gespeichert werden. Dieses Cookie enthält eine charakteristische Zeichenfolge, die eine eindeutige Identifizierung des Browsers beim erneuten Aufrufen der Website ermöglicht. Wir setzen Cookies ein, um unsere Website nutzerfreundlicher zu gestalten. Einige Elemente unserer Internetseite erfordern es, dass der aufrufende Browser auch nach einem Seitenwechsel identifiziert werden kann. In den Cookies werden dabei folgende Daten gespeichert und übermittelt:
(1) Letzter aktivierter Menüpunkt
(2) Status aufklickbarer Bereiche
Zusätzlich zu eigenen Cookies werden bei Bedarf weitere 3rd-Party Cookies verwendet, die Beschreibung erfolgt im jeweiligen Abschnitt.

2. Rechtsgrundlage für die Datenverarbeitung
Die Rechtsgrundlage für die Verarbeitung personenbezogener Daten unter Verwendung von Cookies ist Art. 6 Abs. 1 lit. f DSGVO.

3. Zweck der Datenverarbeitung
Der Zweck der Verwendung technisch notwendiger Cookies ist, die Nutzung von Websites für die Nutzer zu vereinfachen. Einige Funktionen unserer Internetseite können ohne den Einsatz von Cookies nicht angeboten werden. Für diese ist es erforderlich, dass der Browser auch nach einem Seitenwechsel wiedererkannt wird. Für folgende Anwendungen benötigen wir Cookies:
(1) Steuerung der Website
Die durch technisch notwendige Cookies erhobenen Nutzerdaten werden nicht zur Erstellung von Nutzerprofilen verwendet. In diesen Zwecken liegt auch unser berechtigtes Interesse in der Verarbeitung der personenbezogenen Daten nach Art. 6 Abs. 1 lit. f DSGVO.

4. Dauer der Speicherung, Widerspruchs- und Beseitigungsmöglichkeit
Cookies werden auf dem Rechner des Nutzers gespeichert und von diesem an unserer Seite übermittelt. Daher haben Sie als Nutzer auch die volle Kontrolle über die Verwendung von Cookies. Durch eine Änderung der Einstellungen in Ihrem Internetbrowser können Sie die Übertragung von Cookies deaktivieren oder einschränken. Bereits gespeicherte Cookies können jederzeit gelöscht werden. Dies kann auch automatisiert erfolgen. Werden Cookies für unsere Website deaktiviert, können möglicherweise nicht mehr alle Funktionen der Website vollumfänglich genutzt werden.

Kontaktformular und E-Mail-Kontakt

1. Beschreibung und Umfang der Datenverarbeitung
Auf unserer Website kann ein Kontaktformular vorhanden sein, welches für die elektronische Kontaktaufnahme genutzt werden kann. Nimmt ein Nutzer diese Möglichkeit wahr, so werden die in der Eingabemaske eingegeben Daten an uns übermittelt und gespeichert.


Im Zeitpunkt der Absendung der Nachricht werden zudem folgende Daten gespeichert: (1) Datum und Uhrzeit der Kontaktaufnahme
Für die Verarbeitung der Daten wird im Rahmen des Absendevorgangs Ihre Einwilligung eingeholt und auf diese Datenschutzerklärung verwiesen.

Alternativ ist eine Kontaktaufnahme über die bereitgestellte E-Mail-Adresse möglich. In diesem Fall werden die mit der E-Mail übermittelten personenbezogenen Daten des Nutzers gespeichert. Es erfolgt in diesem Zusammenhang keine Weitergabe der Daten an Dritte. Die Daten werden ausschließlich für die Verarbeitung der Konversation verwendet.

2. Rechtsgrundlage für die Datenverarbeitung
Rechtsgrundlage für die Verarbeitung der Daten ist bei Vorliegen einer Einwilligung des Nutzers Art. 6 Abs. 1 lit. a DSGVO. Rechtsgrundlage für die Verarbeitung der Daten, die im Zuge einer Übersendung einer E-Mail übermittelt werden, ist Art. 6 Abs. 1 lit. f DSGVO. Zielt der E-Mail-Kontakt auf den Abschluss eines Vertrages ab, so ist zusätzliche Rechtsgrundlage für die Verarbeitung Art. 6 Abs. 1 lit. b DSGVO.

3. Zweck der Datenverarbeitung
Die Verarbeitung der personenbezogenen Daten aus der Eingabemaske des Kontaktformulars dient uns allein zur Bearbeitung der Kontaktaufnahme. Im Falle einer Kontaktaufnahme per E-Mail liegt hieran auch das erforderliche berechtigte Interesse an der Verarbeitung der Daten. Die sonstigen während des Absendevorgangs verarbeiteten personenbezogenen Daten dienen dazu, einen Missbrauch des Kontaktformulars zu verhindern und die Sicherheit unserer informationstechnischen Systeme sicherzustellen.

4. Dauer der Speicherung
Die Daten werden gelöscht, sobald sie für die Erreichung des Zweckes ihrer Erhebung nicht mehr erforderlich sind. Für die personenbezogenen Daten aus der Eingabemaske des Kontaktformulars und diejenigen, die per E-Mail übersandt wurden, ist dies dann der Fall, wenn die jeweilige Konversation mit dem Nutzer beendet ist. Beendet ist die Konversation dann, wenn sich aus den Umständen entnehmen lässt, dass der betroffene Sachverhalt abschließend geklärt ist. Die während des Absendevorgangs zusätzlich erhobenen personenbezogenen Daten werden spätestens nach einer Frist von sieben Tagen gelöscht.

5. Widerspruchs- und Beseitigungsmöglichkeit
Der Nutzer hat jederzeit die Möglichkeit, seine Einwilligung zur Verarbeitung der personenbezogenen Daten zu widerrufen. Nimmt der Nutzer per E-Mail Kontakt mit uns auf, so kann er der Speicherung seiner personenbezogenen Daten jederzeit widersprechen. In einem solchen Fall kann die Konversation nicht fortgeführt werden. Alle personenbezogenen Daten, die im Zuge der Kontaktaufnahme gespeichert wurden, werden in diesem Fall gelöscht.

Einbindung von Diensten und Inhalten Dritter

Unser Angebot kann mitunter Inhalte, Dienste und Leistungen anderer Anbieter umfassen. Das sind zum Beispiel Karten, Videos sowie Grafiken und Bilder anderer Webseiten. Damit diese Daten im Browser des Nutzers aufgerufen und dargestellt werden können, ist die Übermittlung der IP-Adresse zwingend notwendig. Die Anbieter (im Folgenden als „Dritt-Anbieter“ bezeichnet) nehmen also die IP-Adresse des jeweiligen Nutzers wahr.

Auch wenn wir bemüht sind, ausschließlich Dritt-Anbieter zu nutzen, welche die IP-Adresse nur benötigen, um Inhalte ausliefern zu können, haben wir keinen Einfluss darauf, ob die IP-Adresse möglicherweise gespeichert wird. Dieser Vorgang dient in dem Fall unter anderem statistischen Zwecken. Sofern wir Kenntnis davon haben, dass die IP-Adresse gespeichert wird, weisen wir unsere Nutzer darauf hin.

Datensparsamkeit

Personenbezogene Daten speichern wir gemäß den Grundsätzen der Datenvermeidung und Datensparsamkeit nur so lange, wie es erforderlich ist oder vom Gesetzgeber her vorgeschrieben wird (gesetzliche Speicherfrist). Entfällt der Zweck der erhobenen Informationen oder endet die Speicherfrist, sperren oder löschen wir die Daten.

Rechte der betroffenen Person

1. Auskunftsrecht
Sie können von dem Verantwortlichen eine Bestätigung darüber verlangen, ob personenbezogene Daten, die Sie betreffen, von uns verarbeitet werden. Liegt eine solche Verarbeitung vor, können Sie von dem Verantwortlichen über folgende Informationen Auskunft verlangen:

2. Recht auf Berichtigung
Sie haben ein Recht auf Berichtigung und/oder Vervollständigung gegenüber dem Verantwortlichen, sofern die verarbeiteten personenbezogenen Daten, die Sie betreffen, unrichtig oder unvollständig sind. Der Verantwortliche hat die Berichtigung unverzüglich vorzunehmen.

3. Recht auf Einschränkung der Verarbeitung
Unter den folgenden Voraussetzungen können Sie die Einschränkung der Verarbeitung der Sie betreffenden personenbezogenen Daten verlangen: (1) wenn Sie die Richtigkeit der Sie betreffenden personenbezogenen für eine Dauer bestreiten, die es dem Verantwortlichen ermöglicht, die Richtigkeit der personenbezogenen Daten zu überprüfen; (2) die Verarbeitung unrechtmäßig ist und Sie die Löschung der personenbezogenen Daten ablehnen und stattdessen die Einschränkung der Nutzung der personenbezogenen Daten verlangen; (3) der Verantwortliche die personenbezogenen Daten für die Zwecke der Verarbeitung nicht länger benötigt, Sie diese jedoch zur Geltendmachung, Ausübung oder Verteidigung von Rechtsansprüchen benötigen, oder (4) wenn Sie Widerspruch gegen die Verarbeitung gemäß Art. 21 Abs. 1 DSGVO eingelegt haben und noch nicht feststeht, ob die berechtigten Gründe des Verantwortlichen gegenüber Ihren Gründen überwiegen. Wurde die Verarbeitung der Sie betreffenden personenbezogenen Daten eingeschränkt, dürfen diese Daten – von ihrer Speicherung abgesehen – nur mit Ihrer Einwilligung oder zur Geltendmachung, Ausübung oder Verteidigung von Rechtsansprüchen oder zum Schutz der Rechte einer anderen natürlichen oder juristischen Person oder aus Gründen eines wichtigen öffentlichen Interesse der Union oder eines Mitgliedstaats verarbeitet werden. Wurde die Einschränkung der Verarbeitung nach den o.g. Voraussetzungen eingeschränkt, werden Sie von dem Verantwortlichen unterrichtet bevor die Einschränkung aufgehoben wird.

4. Recht auf Löschung

(2) Sie widerrufen Ihre Einwilligung, auf die sich die Verarbeitung gem. Art. 6 Abs. 1 lit. a oder Art. 9 Abs. 2 lit. a DSGVO stützte, und es fehlt an einer anderweitigen Rechtsgrundlage für die Verarbeitung.
(3) Sie legen gem. Art. 21 Abs. 1 DSGVO Widerspruch gegen die Verarbeitung ein und es liegen keine vorrangigen berechtigten Gründe für die Verarbeitung vor, oder Sie legen gem. Art. 21 Abs. 2 DSGVO Widerspruch gegen die Verarbeitung ein.

(5) Die Löschung der Sie betreffenden personenbezogenen Daten ist zur Erfüllung einer rechtlichen Verpflichtung nach dem Unionsrecht oder dem Recht der Mitgliedstaaten erforderlich, dem der Verantwortliche unterliegt. (6) Die Sie betreffenden personenbezogenen Daten wurden in Bezug auf angebotene Dienste der Informationsgesellschaft gemäß Art. 8 Abs. 1 DSGVO erhoben.

b) Information an Dritte
Hat der Verantwortliche die Sie betreffenden personenbezogenen Daten öffentlich gemacht und ist er gem. Art. 17 Abs. 1 DSGVO zu deren Löschung verpflichtet, so trifft er unter Berücksichtigung der verfügbaren Technologie und der Implementierungskosten angemessene Maßnahmen, auch technischer Art, um für die Datenverarbeitung Verantwortliche, die die personenbezogenen Daten verarbeiten, darüber zu informieren, dass Sie als betroffene Person von ihnen die Löschung aller Links zu diesen personenbezogenen Daten oder von Kopien oder Replikationen dieser personenbezogenen Daten verlangt haben. c) Ausnahmen
Das Recht auf Löschung besteht nicht, soweit die Verarbeitung erforderlich ist

7. Widerspruchsrecht
Sie haben das Recht, aus Gründen, die sich aus ihrer besonderen Situation ergeben, jederzeit gegen die Verarbeitung der Sie betreffenden personenbezogenen Daten, die aufgrund von Art. 6 Abs. 1 lit. e oder f DSGVO erfolgt, Widerspruch einzulegen; dies gilt auch für ein auf diese Bestimmungen gestütztes Profiling. Der Verantwortliche verarbeitet die Sie betreffenden personenbezogenen Daten nicht mehr, es sei denn, er kann zwingende schutzwürdige Gründe für die Verarbeitung nachweisen, die Ihre Interessen, Rechte und Freiheiten überwiegen, oder die Verarbeitung dient der Geltendmachung, Ausübung oder Verteidigung von Rechtsansprüchen. Werden die Sie betreffenden personenbezogenen Daten verarbeitet, um Direktwerbung zu betreiben, haben Sie das Recht, jederzeit Widerspruch gegen die Verarbeitung der Sie betreffenden personenbezogenen Daten zum Zwecke derartiger Werbung einzulegen; dies gilt auch für das Profiling, soweit es mit solcher Direktwerbung in Verbindung steht. Widersprechen Sie der Verarbeitung für Zwecke der Direktwerbung, so werden die Sie betreffenden personenbezogenen Daten nicht mehr für diese Zwecke verarbeitet. Sie haben die Möglichkeit, im Zusammenhang mit der Nutzung von Diensten der Informationsgesellschaft – ungeachtet der Richtlinie 2002/58/EG – Ihr Widerspruchsrecht mittels automatisierter Verfahren auszuüben, bei denen technische Spezifikationen verwendet werden.

lzeug in Entenform",detail:"Liebevoll gefertigtes Holzspielzeug in klassischer Entenform. Aus naturbelassenem, schadstofffreiem Holz gefertigt – ideal für Kinder. Die glatte Oberfläche und die abgerundeten Kanten machen diese Ente zu einem sicheren Begleiter. Ein zeitloses Spielzeug, das Generationen überdauert.",image:"src/assets/Ente/IMG_0715.jpeg"},{id:3,name:"Holzkiste",description:"Dekorative Holzbox für Aufbewahrung",detail:"Robuste und dekorative Holzkiste für vielseitige Verwendung. Ideal zur Aufbewahrung von Kleinigkeiten, als Geschenkverpackung oder als Dekoelement. Aus massivem Holz gefertigt mit praktischem Deckel. Die natürliche Holzmaserung macht jede Kiste einzigartig.",image:"src/assets/kiste/IMG_0720.jpeg"},{id:5,name:"Holzregal",description:"Stilvolles Wandregal aus massivem Holz",detail:"Stilvolles Wandregal aus massivem Holz. Perfekt für die Präsentation von Büchern, Pflanzen oder Dekorationsgegenständen. Die stabile Konstruktion trägt auch schwerere Lasten problemlos. Mit sichtbarer Holzmaserung und natürlicher Oberflächenbehandlung – ein echter Hingucker für jede Wand.",image:"src/assets/regal/IMG_0722.jpeg"},{id:6,name:"Vogelhaus",description:"Gemütliches Vogelhaus für den Garten",detail:"Gemütliches Vogelhaus für Ihren Garten oder Balkon. Bietet heimischen Vögeln einen geschützten Futterplatz. Aus wetterfestem Holz gefertigt mit großer Futteröffnung und abnehmbarem Dach zur einfachen Reinigung. Das Vogelhaus ist mit natürlicher Lasur behandelt und hält Wind und Wetter stand.",image:"src/assets/vogelhaus/vogelhaus.png"},{id:7,name:"Wasserwaage",description:"Wasserwaage aus Holz für präzises Arbeiten",detail:"Präzise Wasserwaage aus hochwertigem Holz. Ideal für Handwerker und Heimwerker, die Wert auf Qualität und natürliche Materialien legen. Mit zwei Libellen für horizontale und vertikale Messungen. Die robuste Holzkonstruktion liegt gut in der Hand und ist besonders langlebig.",image:"src/assets/wasserwaage/IMG_0726.jpeg"}]}},jk={nav:{product k to Home",phone:"Phone",email:"E-mail"},privacy:{title:"Privacy Policy",overview:`The following information provides a simple overview of what happens to your personal data when you visit our website. Personal data are all information that can be used to identify you personally. For detailed information on data protection please refer to our privacy policy beneath this text.

The controller within the meaning of the General Data Protection Regulation (GDPR) and other national data protection laws of the Member States as well as other data protection provisions is

BBS I Lüneburg
Spillbrunnenweg 1
21337 Lüneburg

datenschutz{'@'}bbs1-lueneburg.de

General information on data processing

1. Scope of processing of personal data We only process personal data of our users insofar as this is necessary to provide a functional website as well as our contents and services. The processing of personal data of our users is usually carried out only after obtaining the user's consent. An exception applies in cases where prior consent cannot be obtained for factual reasons and the processing of the data is permitted by legal provisions.

2. Legal basis for the processing of personal data
If we obtain the consent of the data subject for processing operations involving personal data, Article 6(1)(a) GDPR serves as the legal basis. When processing personal data that are necessary for the performance of a contract to which the data subject is a party, Article 6(1)(b) GDPR serves as the legal basis. This also applies to processing operations that are necessary for taking steps prior to entering into a contract. If the processing of personal data is necessary to fulfill a legal obligation to which our company is subject, Article 6(1)(c) GDPR serves as the legal basis. In cases where processing is necessary to protect vital interests of the data subject or another natural person, Article 6(1)(d) GDPR serves as the legal basis. If the processing is necessary for the purposes of the legitimate interests pursued by our company or a third party and the interests or fundamental rights and freedoms of the data subject do not override those interests, Article 6(1)(f) GDPR serves as the legal basis.

3. Data deletion and retention period
The personal data of the data subject are deleted or blocked as soon as the purpose of storage ceases to apply. Storage may also take place if provided for by European or national legislation in union regulations, laws or other provisions to which the controller is subject. Data shall also be blocked or deleted if the storage period prescribed by the aforementioned standards expires, unless further storage of the data is required for the conclusion or performance of a contract.

Provision of the website and creation of log files

1. Description and scope of data processing
Each time our internet page is accessed, our system automatically collects data and information from the calling computer system.

The following data are collected:
(1) Information about the browser type and version used
(2) The operating system of the user
(3) The user's internet service provider
(4) The user's IP address
(5) Date and time of access
(6) Websites from which the user's system reaches our website
(7) Websites that are accessed by the user's system via our website
The data are also stored in the log files of our system. These data are not stored together with other personal data of the user.

2. Legal basis for data processing
Legal basis for the temporary storage of the data and the log files is Article 6(1)(f) GDPR.

3. Purpose of data processing
The temporary storage of the IP address by the system is necessary to deliver the website to the user's computer. For this purpose the IP address of the user must be stored for the duration of the session. The storage in log files is carried out in order to ensure the functionality of the website. In addition, the data are used to optimise the website and to ensure the security of our IT systems. An evaluation of the data for marketing purposes does not take place in this respect. The legitimate interest in data processing pursuant to Article 6(1)(f) GDPR lies in the aforementioned purposes.

4. Duration of storage
The data are deleted as soon as they are no longer necessary to achieve the purpose for which they were collected. In the case of data collected for the provision of the website, this is the case when the respective session has ended. In the case of storage of the data in log files, this is the case after at most ten days. Further storage may be carried out in connection with backups; in this case the maximum storage period is six months.

5. Right to object and removal option
The collection of data for the provision of the website and the storage of the data in log files is absolutely necessary for the operation of the website. There is therefore no possibility for the user to object.

Use of cookies

1. Description and scope of data processing
Our website uses cookies. Cookies are text files which are stored in the internet browser or by the internet browser on the user's computer system. When a user visits a website, a cookie may be stored on the user's operating system. This cookie contains a characteristic string of characters that enables the browser to be uniquely identified when the website is visited again. We use cookies to make our website more user-friendly. Some elements of our website require that the calling browser be recognised even after a page change. The following data are stored and transmitted in cookies:
(1) Last activated menu item
(2) Status of clickable areas
In addition to our own cookies, other third-party cookies may be used as needed; the description is provided in the corresponding section.

2. Legal basis for data processing
The legal basis for processing personal data using cookies is Article 6(1)(f) GDPR.

3. Purpose of data processing
The purpose of using technically necessary cookies is to make it easier for users to use the website. Some functions of our website cannot be offered without the use of cookies. For these functions it is necessary that the browser be recognised after a page change. We need cookies for the following applications:
(1) Website control
The user data collected by technically necessary cookies are not used to create user profiles. The legitimate interest in processing personal data according to Article 6(1)(f) GDPR lies in these purposes.

4. Duration of storage, objection and removal option
Cookies are stored on the user's computer and transmitted by the user to our site. Therefore, you as a user also have full control over the use of cookies. By changing the settings in your internet browser, you can disable or restrict the transmission of cookies. Cookies that have already been stored can be deleted at any time. This can also be automated. If cookies are disabled for our website, not all functions of the website may be usable to their full extent.

Contact form and e-mail contact

1. Description and scope of data processing
A contact form may be available on our website for electronic communication. If a user uses this option, the data entered in the input mask are transmitted to us and stored.

At the time the message is sent, the following data are also stored: (1) date and time of contact
Your consent is obtained during the sending process and reference is made to this privacy policy.

Alternatively, you may contact us via the provided e-mail address. In this case, the personal data transmitted with the email are stored. There is no transmission of the data to third parties. The data are used exclusively for processing the correspondence.

2. Legal basis for data processing
The legal basis for data processing is Article 6(1)(a) GDPR if the user has given consent. The legal basis for data processing transmitted as part of an e-mail is Article 6(1)(f) GDPR. If the e-mail contact aims at the conclusion of a contract, additional legal basis is Article 6(1)(b) GDPR.

3. Purpose of data processing
The processing of personal data from the contact form input mask serves solely to handle the contact. In the case of contact by e-mail, our legitimate interest in processing lies in this. The other personal data processed in the sending process serve to prevent misuse of the contact form and to ensure the security of our IT systems.

4. Duration of storage
The data are deleted as soon as they are no longer necessary to achieve the purpose for which they were collected. For personal data from the contact form and those sent by e-mail, this is when the respective correspondence with the user has ended. A conversation is considered ended when the circumstances indicate that the matter in question has been conclusively clarified. The additionally collected personal data during the sending process are deleted after a maximum of seven days.

5. Right of objection and removal option
You may revoke your consent to the processing of personal data at any time. If you contact us by e-mail, you may object to the storage of your personal data at any time. In such a case, the correspondence cannot be continued. All personal data stored in the course of the contact will then be deleted.

Integration of third-party services and content

Our offer may include content, services and features from other providers, e.g. maps, videos or graphics from other websites. To display this data in the user's browser, the user's IP address must be transmitted. The providers ("third parties") thus perceive the user's IP address.

Although we endeavour to use only third-party providers who require the IP address solely to deliver content, we have no control over whether the IP address may be stored. This may occur, among other things, for statistical purposes. If we are aware that the IP address is stored, we will inform our users.

Data minimisation

We store personal data according to the principles of data avoidance and data minimisation only for as long as necessary or as required by law (statutory retention period). If the purpose of the collected information no longer applies or the retention period ends, we block or delete the data.

Rights of the data subject

If personal data about you are processed, you are a data subject within the meaning of the GDPR and have the following rights:

1. Right of access
You may request confirmation from the controller as to whether personal data concerning you are being processed by us. If such processing exists, you may request information from the controller about the following:
(1) the purposes for which the personal data are processed;
(2) the categories of personal data being processed;
(3) the recipients or categories of recipients to whom the personal data concerning you have been or will be disclosed;
(4) the planned duration of storage of the personal data concerning you or, if specific information is not possible, criteria used to determine the storage period;
(5) the existence of a right to rectification or deletion of personal data concerning you, a right to restriction of processing by the controller, or a right to object to such processing;
(6) the existence of a right to lodge a complaint with a supervisory authority;
(7) all available information as to the source of the data if the personal data are not collected from the data subject;
(8) the existence of automated decision-making, including profiling, pursuant to Article 22(1) and (4) GDPR and, at least in those cases, meaningful information about the logic involved and the scope and intended consequences of such processing for the data subject.
You also have the right to request information on whether personal data concerning you are transferred to a third country or to an international organisation. In this context, you may request to be informed of the appropriate safeguards pursuant to Article 46 GDPR in connection with the transfer.

2. Right to rectification
You have a right to rectification and/or completion vis-a-vis the controller if the personal data processed concerning you are inaccurate or incomplete. The controller must carry out the rectification without undue delay.

3. Right to restriction of processing
Under the following conditions, you may request restriction of processing of personal data concerning you:
(1) if you contest the accuracy of the personal data concerning you for a period enabling the controller to verify the accuracy of the personal data;
(2) the processing is unlawful and you oppose the erasure of the personal data and request restriction of their use instead;
(3) the controller no longer needs the personal data for the purposes of processing, but you require them for the establishment, exercise or defence of legal claims; or
(4) if you have objected to processing pursuant to Article 21(1) GDPR and it has not yet been determined whether the legitimate grounds of the controller override your grounds.
Where processing of personal data concerning you has been restricted, such data may, with the exception of storage, only be processed with your consent or for the establishment, exercise or defence of legal claims, or for the protection of the rights of another natural or legal person, or for reasons of important public interest of the Union or of a Member State.
If the restriction of processing is lifted after being imposed under the above conditions, you will be informed by the controller before the restriction is lifted.

4. Right to erasure
a) Obligation to erase
You may request that the controller erase personal data concerning you without undue delay, and the controller is obliged to erase such data without undue delay if one of the following grounds applies:
(1) The personal data concerning you are no longer necessary in relation to the purposes for which they were collected or otherwise processed.
(2) You withdraw your consent on which the processing was based pursuant to Article 6(1)(a) or Article 9(2)(a) GDPR, and there is no other legal ground for processing.
(3) You object to the processing pursuant to Article 21(1) GDPR and there are no overriding legitimate grounds for processing, or you object to the processing pursuant to Article 21(2) GDPR.
(4) The personal data concerning you have been unlawfully processed.
(5) Erasure of the personal data concerning you is necessary for compliance with a legal obligation under Union or Member State law to which the controller is subject.
(6) The personal data concerning you were collected in relation to information society services offered pursuant to Article 8(1) GDPR.
b) Information to third parties
Where the controller has made personal data concerning you public and is obliged pursuant to Article 17(1) GDPR to erase the personal data, the controller shall, taking account of available technology and implementation costs, take reasonable steps, including technical measures, to inform controllers processing the personal data that you, as the data subject, have requested the erasure by such controllers of any links to, or copy or replication of, those personal data.
c) Exceptions
The right to erasure does not apply to the extent processing is necessary:
(1) for exercising the right of freedom of expression and information;
(2) for compliance with a legal obligation requiring processing under Union or Member State law to which the controller is subject, or for the performance of a task carried out in the public interest or in the exercise of official authority vested in the controller;
(3) for reasons of public interest in the area of public health in accordance with Article 9(2)(h) and (i) and Article 9(3) GDPR;
(4) for archiving purposes in the public interest, scientific or historical research purposes or statistical purposes pursuant to Article 89(1) GDPR insofar as the right referred to in section a) is likely to render impossible or seriously impair the achievement of the objectives of that processing; or
(5) for the establishment, exercise or defence of legal claims.

5. Right to notification
If you have exercised your right to rectification, erasure or restriction of processing against the controller, the controller is obliged to communicate this rectification or erasure of data or restriction of processing to each recipient to whom the personal data concerning you have been disclosed, unless this proves impossible or involves disproportionate effort. You have the right to be informed by the controller about those recipients.

6. Right to data portability
You have the right to receive the personal data concerning you, which you have provided to the controller, in a structured, commonly used and machine-readable format. You also have the right to transmit those data to another controller without hindrance from the controller to whom the personal data were provided, where
(1) the processing is based on consent pursuant to Article 6(1)(a) GDPR or Article 9(2)(a) GDPR or on a contract pursuant to Article 6(1)(b) GDPR, and
(2) the processing is carried out by automated means.
In exercising this right, you also have the right to have the personal data concerning you transmitted directly from one controller to another, where technically feasible. Freedoms and rights of others must not be adversely affected by this. The right to data portability does not apply to processing of personal data necessary for the performance of a task carried out in the public interest or in the exercise of official authority vested in the controller.

7. Right to object
You have the right to object, on grounds relating to your particular situation, at any time to processing of personal data concerning you based on Article 6(1)(e) or (f) GDPR; this also applies to profiling based on those provisions. The controller shall no longer process the personal data concerning you unless the controller demonstrates compelling legitimate grounds for the processing which override your interests, rights and freedoms, or the processing serves the establishment, exercise or defence of legal claims.
Where personal data concerning you are processed for direct marketing purposes, you have the right to object at any time to processing of personal data concerning you for such marketing, including profiling to the extent related to such direct marketing. If you object to processing for direct marketing purposes, the personal data concerning you will no longer be processed for such purposes.
In the context of the use of information society services, and notwithstanding Directive 2002/58/EC, you may exercise your right to object by automated means using technical specifications.

8. Right to withdraw data protection consent
You have the right to withdraw your data protection consent at any time. Withdrawal of consent does not affect the lawfulness of processing based on consent before its withdrawal.

9. Automated decision-making in individual cases, including profiling
You have the right not to be subject to a decision based solely on automated processing, including profiling, which produces legal effects concerning you or similarly significantly affects you. This does not apply if the decision:
(1) is necessary for entering into, or performance of, a contract between you and the controller,
(2) is authorised by Union or Member State law to which the controller is subject and which also lays down suitable measures to safeguard your rights and freedoms and legitimate interests, or
(3) is based on your explicit consent.
However, those decisions may not be based on special categories of personal data referred to in Article 9(1) GDPR unless Article 9(2)(a) or (g) GDPR applies and suitable measures to safeguard your rights and freedoms and legitimate interests are in place. In the cases referred to in (1) and (3), the controller shall implement suitable measures to safeguard your rights and freedoms and legitimate interests, including at least the right to obtain human intervention by the controller, to express your point of view and to contest the decision.

10. Right to lodge a complaint with a supervisory authority
Without prejudice to any other administrative or judicial remedy, you have the right to lodge a complaint with a supervisory authority, in particular in the Member State of your habitual residence, place of work or place of the alleged infringement, if you consider that the processing of personal data concerning you infringes the GDPR. The supervisory authority with which the complaint has been lodged shall inform the complainant on the status and outcome of the complaint including the possibility of a judicial remedy pursuant to Article 78 GDPR.

Use of script libraries (Google Webfonts)
To display our content correctly and in a visually appealing manner across browsers, we use script libraries and font libraries on this website, such as Google Webfonts (https://www.google.com/webfonts/). Provider: Google LLC ("Google"). Google Webfonts are transferred to your browser cache to avoid multiple loading. If your browser does not support Google Webfonts or blocks access, content is displayed in a standard font. Calling script libraries or font libraries automatically triggers a connection to the library provider. It is theoretically possible - currently unclear, however, whether and for what purposes - that operators of such libraries collect data. You can find the privacy policy of the library provider Google here: https://www.google.com/policies/privacy/

Changes to our privacy policy
To ensure that our privacy policy always complies with current legal requirements, we reserve the right to make changes at any time. This also applies if the privacy policy must be adapted due to new or revised services, for example new service offerings. The new privacy policy then applies to your next visit to our website.
